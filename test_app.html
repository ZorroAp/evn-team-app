<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background: #F5F5F5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 16px; padding: 2rem; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 300px; width: 90%; }
  .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5rem; }
  .dot { width: 16px; height: 16px; border-radius: 50%; }
  .dot.blue { background: #29ABE2; }
  .dot.green { background: #8DC63F; }
  h1 { font-size: 22px; color: #414042; margin-bottom: 0.5rem; }
  p { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .btn { background: #29ABE2; color: white; border: none; border-radius: 10px; padding: 12px 24px; font-size: 16px; cursor: pointer; width: 100%; }
  .btn:active { background: #1e90c2; }
  .result { margin-top: 1rem; font-size: 18px; color: #8DC63F; font-weight: 600; min-height: 28px; }
</style>
</head>
<body>
<div class="card">
  <div class="dots">
    <div class="dot blue"></div>
    <div class="dot green"></div>
  </div>
  <h1>animations planet</h1>
  <p>Test App – GitHub Upload</p>
  <button class="btn" onclick="document.getElementById('r').textContent = '✓ Es funktioniert!'">Klick mich!</button>
  <div class="result" id="r"></div>
</div>
</body>
</html>
